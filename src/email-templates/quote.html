<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{SUBJECT}} – Spaceman Tech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f2f2f2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      padding: 24px 16px;
    }
    .email {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .header {
      background: #0d0d0d;
      padding: 32px 40px;
    }
    .header .logo {
      font-size: 18px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    .header .logo span { color: #ff5f35; }
    .body { padding: 40px; }
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #ff5f35;
      margin-bottom: 10px;
      margin-top: 32px;
    }
    p {
      font-size: 15px;
      line-height: 1.7;
      color: #3a3a3a;
      margin-bottom: 12px;
    }
    ul {
      padding-left: 0;
      list-style: none;
      margin-bottom: 12px;
    }
    ul li {
      font-size: 15px;
      line-height: 1.7;
      color: #3a3a3a;
      padding: 6px 0 6px 22px;
      position: relative;
      border-bottom: 1px solid #f5f5f5;
    }
    ul li:last-child { border-bottom: none; }
    ul li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 15px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff5f35;
    }
    .scope-box {
      background: #fafafa;
      border: 1px solid #efefef;
      border-radius: 8px;
      padding: 24px 28px;
      margin: 16px 0 24px;
    }
    .scope-box .scope-title {
      font-size: 13px;
      font-weight: 700;
      color: #0d0d0d;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .not-included {
      background: #f7f7f7;
      border-left: 3px solid #e0e0e0;
      border-radius: 0 6px 6px 0;
      padding: 16px 20px;
      margin: 16px 0 24px;
    }
    .not-included p {
      font-size: 14px;
      color: #888;
      margin: 0;
    }
    .not-included strong { color: #555; }
    .callout-box {
      background: #fff8f6;
      border: 1px solid #ffd5c8;
      border-radius: 8px;
      padding: 24px 28px;
      margin: 24px 0;
    }
    .callout-box .callout-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #ff5f35;
      margin-bottom: 10px;
    }
    .callout-box p { margin-bottom: 8px; }
    .callout-box p:last-child { margin-bottom: 0; }
    .price-box {
      background: #0d0d0d;
      border-radius: 8px;
      padding: 28px 32px;
      margin: 8px 0 28px;
    }
    .price-box .price {
      font-size: 40px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -1.5px;
    }
    .price-box .price span { color: #ff5f35; }
    .price-box .price-sub {
      font-size: 13px;
      color: #888;
      margin-top: 6px;
    }
    .price-box .price-detail {
      font-size: 14px;
      color: #aaa;
      margin-top: 12px;
      border-top: 1px solid #222;
      padding-top: 12px;
      line-height: 1.8;
    }
    .question-box {
      background: #f7f9ff;
      border: 1px solid #dce6ff;
      border-radius: 8px;
      padding: 24px 28px;
      margin: 28px 0;
    }
    .question-box .q-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #3b5bdb;
      margin-bottom: 10px;
    }
    .question-box p { margin-bottom: 8px; }
    .question-box ol {
      padding-left: 18px;
      margin: 10px 0 0;
    }
    .question-box ol li {
      font-size: 15px;
      line-height: 1.7;
      color: #3a3a3a;
      margin-bottom: 4px;
    }
    .footer {
      padding: 24px 40px;
      border-top: 1px solid #f0f0f0;
    }
    .footer p {
      font-size: 13px;
      color: #aaa;
      margin: 0;
    }
    .footer strong { color: #555; font-weight: 600; }
  </style>
</head>
<body>
  <div class="email">
    <div class="header">
      <div class="logo">Spaceman<span>Tech</span></div>
    </div>
    <div class="body">

      <!-- GREETING -->
      <p>Hi {{CLIENT_NAME}},</p>
      <p>{{INTRO_PARAGRAPH}}</p>

      <!-- OPTIONAL: HONEST RECALIBRATION BOX (use when correcting a previous estimate) -->
      <!--
      <div class="callout-box">
        <div class="callout-label">A note on scope and price</div>
        <p>{{RECALIBRATION_TEXT}}</p>
      </div>
      -->

      <!-- OPTIONAL: RECOMMENDATION BOX (use when suggesting a different approach) -->
      <!--
      <div class="callout-box">
        <div class="callout-label">Our recommendation</div>
        <p>{{RECOMMENDATION_TEXT}}</p>
      </div>
      -->

      <!-- SCOPE -->
      <div class="section-label">What is included</div>
      <div class="scope-box">
        <div class="scope-title">{{PROJECT_NAME}}</div>
        <ul>
          <!-- <li>Feature one</li> -->
          <!-- <li>Feature two</li> -->
          {{SCOPE_ITEMS}}
        </ul>
      </div>

      <!-- OPTIONAL: NOT INCLUDED -->
      <!--
      <div class="not-included">
        <p><strong>Not included:</strong> {{NOT_INCLUDED_TEXT}}</p>
      </div>
      -->

      <!-- PRICE -->
      <div class="section-label">Investment</div>
      <div class="price-box">
        <div class="price">{{PRICE}}</div>
        <div class="price-sub">{{PROJECT_NAME}}</div>
        <div class="price-detail">{{PAYMENT_TERMS}}</div>
      </div>

      <!-- OPTIONAL: OPEN QUESTION BOX -->
      <!--
      <div class="question-box">
        <div class="q-label">One question before we finalize</div>
        <p>{{QUESTION_TEXT}}</p>
      </div>
      -->

      <!-- CLOSING -->
      <p>{{CLOSING_PARAGRAPH}}</p>

    </div>
    <div class="footer">
      <p><strong>Javier Roque</strong> &nbsp;&middot;&nbsp; Spaceman Tech LLC<br />hello@spacemantech.ai &nbsp;&middot;&nbsp; Delaware, USA</p>
    </div>
  </div>
</body>
</html>
